<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:find</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="text-center">
            <h1 class="mb-4">Re:find</h1>
            <p class="text-muted" id="status">ログイン中...</p>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        liff.init({ liffId: "{{ liff_id }}" }).then(() => {
            // LINEアプリ内かどうかチェック
            if (!liff.isInClient()) {
                // 外部ブラウザからアクセス → 通常のログインフローへ
                window.location.href = "/login";
                return;
            }

            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            // LINEのプロフィール情報を取得
            liff.getProfile().then(profile => {
                // Flaskにユーザー情報を送ってセッション発行
                fetch("/api/liff-login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        userId: profile.userId,
                        displayName: profile.displayName
                    })
                }).then(res => {
                    if (res.ok) {
                        // セッション発行完了 → 一覧画面へ
                        window.location.href = "/";
                    } else {
                        document.getElementById("status").textContent = "ログインに失敗しました";
                    }
                }).catch(() => {
                    document.getElementById("status").textContent = "通信エラーが発生しました";
                });
            }).catch(() => {
                document.getElementById("status").textContent = "プロフィール取得に失敗しました";
            });
        }).catch(err => {
            console.error("LIFF init error:", err);
            // LIFF初期化失敗 → 通常のログインへフォールバック
            window.location.href = "/login";
        });
    </script>
</body>
</html>
