<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Re:find{% endblock %}</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons（アイコン用） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- 共通CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <!-- ページ固有CSS -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- ===== ヘッダー ===== -->
    {% block header %}
    <nav class="navbar navbar-light bg-white border-bottom px-3">
        <a class="navbar-brand fw-bold" href="/">Re:find</a>
        <div>
            <a href="/categories" class="btn btn-sm btn-outline-secondary me-2">
                <i class="bi bi-folder"></i> カテゴリ管理
            </a>
            <button id="logout-btn" class="btn btn-sm btn-outline-danger">
                ログアウト
            </button>
        </div>
    </nav>
    {% endblock %}

    <!-- ===== メインコンテンツ ===== -->
    <main class="container-fluid px-3 py-3">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
    <!-- 共通JS -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <!-- ページ固有JS -->
    {% block extra_js %}{% endblock %}
</body>
</html>
